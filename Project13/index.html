<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image-Slider</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="slider">
        <div class="slides">
            <img class="slide" src="Image1.jpeg" alt="Image numeber 1">
            <img class="slide" src="Image2.jpeg" alt="Image numeber 1">
            <img class="slide" src="Image3.jpeg" alt="Image numeber 1">
            <img class="slide" src="Image4.jpeg" alt="Image numeber 1">
            <img class="slide" src="Image5.jpeg" alt="Image numeber 1">

            <button class="prev" onclick="prevslide()">&#10094</button>
            <button class="next" onclick="nextslide()">&#10095</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

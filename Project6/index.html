<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature-Conversion</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/e1705b93ad.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="wrapper">
        <div class="options-btn">

            <h1 > Temperature-Conversion: <i class="fa-solid fa-temperature-empty" color="red"></i></h1>
            <input id="text-box" type="number">
            <br>
            <label for="radio1">Celsius - Fahrenhiet</label>
            <input id="radio1" type="radio" name="btn">
            <br>
            <label for="radio2">Fahrenhiet - Celsius</label>
            <input id="radio2" type="radio" name="btn">
            <br>
            <button id="submit" type="submit">Submit</button>
            <p id="para">Select a unit</p>

        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

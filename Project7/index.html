<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice-Roller Program</title>
    <link rel = "stylesheet" href="style.css">
    <link rel = "icon" type="image" href="dice-solid-full (1).svg">
    <script src="https://kit.fontawesome.com/e1705b93ad.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="wrapper">
        <div class="options">
            <h1>Dice Roller</h1>
            <br>
            <label for="amount"> #  of dice</label>

            <div id="dice-text"></div>
            <div id="dice-images"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

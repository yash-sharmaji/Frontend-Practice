<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script src="https://kit.fontawesome.com/e1705b93ad.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image" href="calculator-solid-full.svg">
</head>
<body>
    <h1>Welcome to the calculator program</h1>
    <div class="wrapper">
        <div class="calculator">
            <div class="display">
                <input type="text" id="display" readonly value="0">
            </div>
            <div class="options">

            <button data-value="7">7</button>
            <button data-value="8">8</button>
            <button data-value="9">9</button>
            <button data-value="/">/</button>
            <button data-value="AC">AC</button>

            <button data-value="4">4</button>
            <button data-value="5">5</button>
            <button data-value="6">6</button>
            <button data-value="*">*</button>
            <button data-value="^">^</button>

            <button data-value="1">1</button>
            <button data-value="2">2</button>
            <button data-value="3">3</button>
            <button data-value="-">-</button>
            <button data-value="%">%</button>

            <button data-value="0">0</button>
            <button data-value="00">00</button>
            <button data-value=".">.</button>
            <button data-value="+">+</button>
            <button data-value="=">=</button>

            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
